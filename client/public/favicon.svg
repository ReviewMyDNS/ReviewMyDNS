<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Blue gradient background circle -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Globe circle -->
  <circle cx="24" cy="24" r="22" fill="url(#grad1)"/>
  
  <!-- Globe meridians and parallels in white -->
  <ellipse cx="24" cy="24" rx="22" ry="11" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="24" cy="24" rx="11" ry="22" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  <line x1="2" y1="24" x2="46" y2="24" stroke="white" stroke-width="1.5" opacity="0.6"/>
  
  <!-- DNS text or dots to represent network nodes -->
  <circle cx="14" cy="12" r="2.5" fill="white"/>
  <circle cx="34" cy="16" r="2.5" fill="white"/>
  <circle cx="12" cy="32" r="2.5" fill="white"/>
  <circle cx="36" cy="32" r="2.5" fill="white"/>
  <circle cx="24" cy="8" r="2.5" fill="white"/>
  <circle cx="24" cy="40" r="2.5" fill="white"/>
</svg>
