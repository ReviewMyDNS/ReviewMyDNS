<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Option 2: Globe with Network Connection Points -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="40" fill="url(#grad2)" stroke="#1e3a8a" stroke-width="3"/>
  
  <!-- Globe lines -->
  <ellipse cx="50" cy="50" rx="40" ry="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="20" ry="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Network nodes -->
  <circle cx="50" cy="10" r="4" fill="#fbbf24"/>
  <circle cx="50" cy="90" r="4" fill="#fbbf24"/>
  <circle cx="10" cy="50" r="4" fill="#fbbf24"/>
  <circle cx="90" cy="50" r="4" fill="#fbbf24"/>
  <circle cx="25" cy="25" r="4" fill="#fbbf24"/>
  <circle cx="75" cy="25" r="4" fill="#fbbf24"/>
  <circle cx="25" cy="75" r="4" fill="#fbbf24"/>
  <circle cx="75" cy="75" r="4" fill="#fbbf24"/>
  
  <!-- Connection lines -->
  <line x1="50" y1="10" x2="25" y2="25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="10" x2="75" y2="25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <line x1="10" y1="50" x2="25" y2="25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
  <line x1="90" y1="50" x2="75" y2="75" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
</svg>