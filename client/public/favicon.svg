<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Option 1: Simple Clean Globe with Meridians -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#grad1)"/>
  
  <!-- Vertical meridians -->
  <ellipse cx="50" cy="50" rx="15" ry="45" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <ellipse cx="50" cy="50" rx="30" ry="45" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <!-- Horizontal latitude lines -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="15" y1="30" x2="85" y2="30" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="15" y1="70" x2="85" y2="70" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>