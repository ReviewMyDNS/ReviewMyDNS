<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main globe circle with gradient -->
  <circle cx="32" cy="32" r="28" fill="url(#blueGradient)" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Vertical meridian line -->
  <path d="M 32 4 Q 40 32 32 60" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 32 4 Q 24 32 32 60" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Horizontal latitude lines -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  <ellipse cx="32" cy="32" rx="28" ry="18" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- Network connection nodes (bright white dots) -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <circle cx="48" cy="20" r="3" fill="white"/>
  <circle cx="14" cy="44" r="3" fill="white"/>
  <circle cx="50" cy="44" r="3" fill="white"/>
  <circle cx="32" cy="8" r="3" fill="white"/>
  <circle cx="32" cy="56" r="3" fill="white"/>
  
  <!-- Connection lines between nodes (subtle) -->
  <line x1="16" y1="16" x2="32" y2="8" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="48" y1="20" x2="32" y2="8" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="14" y1="44" x2="32" y2="56" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="44" x2="32" y2="56" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="16" x2="48" y2="20" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="14" y1="44" x2="50" y2="44" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>
