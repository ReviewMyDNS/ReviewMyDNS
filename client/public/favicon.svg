<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Option 3: Minimal Modern Globe -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#3b82f6" stroke-width="5"/>
  
  <!-- Single vertical meridian -->
  <path d="M 50 8 Q 65 50 50 92" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <path d="M 50 8 Q 35 50 50 92" fill="none" stroke="#3b82f6" stroke-width="3"/>
  
  <!-- Horizontal equator -->
  <line x1="8" y1="50" x2="92" y2="50" stroke="#3b82f6" stroke-width="3"/>
  
  <!-- Small accent dots -->
  <circle cx="50" cy="8" r="3" fill="#1d4ed8"/>
  <circle cx="50" cy="92" r="3" fill="#1d4ed8"/>
  <circle cx="8" cy="50" r="3" fill="#1d4ed8"/>
  <circle cx="92" cy="50" r="3" fill="#1d4ed8"/>
</svg>