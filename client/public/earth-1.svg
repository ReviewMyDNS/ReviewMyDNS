<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Simple flat design Earth -->
  <circle cx="50" cy="50" r="44" fill="#1e88e5"/>
  
  <!-- Big simple continents -->
  <circle cx="35" cy="35" r="12" fill="#4caf50"/>
  <circle cx="70" cy="30" r="8" fill="#66bb6a"/>
  <ellipse cx="30" cy="60" rx="14" ry="10" fill="#4caf50"/>
  <ellipse cx="65" cy="65" rx="16" ry="12" fill="#66bb6a"/>
  
  <!-- Clean outline -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#0d47a1" stroke-width="3"/>
</svg>