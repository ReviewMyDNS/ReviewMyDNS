<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vibrant cartoon Earth -->
  <circle cx="50" cy="50" r="45" fill="#00bcd4"/>
  
  <!-- Bright green lands -->
  <ellipse cx="32" cy="32" rx="18" ry="14" fill="#00e676"/>
  <ellipse cx="72" cy="28" rx="12" ry="10" fill="#76ff03"/>
  <circle cx="28" cy="62" r="16" fill="#00e676"/>
  <ellipse cx="68" cy="68" rx="18" ry="14" fill="#76ff03"/>
  
  <!-- White clouds -->
  <ellipse cx="45" cy="20" rx="8" ry="4" fill="white" opacity="0.7"/>
  <ellipse cx="65" cy="50" rx="10" ry="5" fill="white" opacity="0.7"/>
  
  <circle cx="50" cy="50" r="45" fill="none" stroke="#0097a7" stroke-width="3"/>
</svg>